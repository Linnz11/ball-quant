services:

  # Run the full test suite in an isolated container
  test:
    build:
      context: .
      target: test
    image: ball-quant:test

  # Live-editing dev shell: src/tests/data/reports mounted as volumes
  dev:
    build:
      context: .
      target: base
    image: ball-quant:dev
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-}
      - BALLQ_STORE_ROOT=${BALLQ_STORE_ROOT:-/app/data/store}
      - BALLQ_REPORTS_DIR=${BALLQ_REPORTS_DIR:-/app/reports}
    env_file:
      - path: .env
        required: false
    stdin_open: true
    tty: true
    entrypoint: ["bash"]

  # Example: run backtest against mounted data
  backtest:
    build:
      context: .
      target: runtime
    image: ball-quant:latest
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-}
      - BALLQ_STORE_ROOT=${BALLQ_STORE_ROOT:-/app/data/store}
      - BALLQ_REPORTS_DIR=${BALLQ_REPORTS_DIR:-/app/reports}
    env_file:
      - path: .env
        required: false
    command: ["backtest"]
    user: "ballq"
